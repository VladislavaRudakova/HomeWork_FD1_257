<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ANKETA_if</title>
</head>
<body>
    <script>
        
        var lastName = prompt("Введите вашу фамилию:");
        var firstName = prompt("Введите ваше имя:");
        var patronymic = prompt("Введите ваше отчество:");
        var age;

        while (true) {
            age = prompt("Введите ваш возраст в годах:");
           
            var parsedAge = parseInt(age);
           
            if (!isNaN(parsedAge) && parsedAge > 0 && parsedAge < 120) {
                age = parsedAge;
                break; 
            }
            alert("Пожалуйста, введите корректный возраст");
        }

        var isMale = confirm("Ваш пол - мужской?");
        
        var ageDays = age * 365;
        var ageIn5Years = age + 5;
        var gender = isMale ? "мужской" : "женский"; 
        
        var isPensioner;
        if (isMale) {
            
            isPensioner = (age >= 63) ? "да" : "нет";
        } else {
           
            isPensioner = (age >= 58) ? "да" : "нет";
        }
        
        
        if (isMale) {
            if (age >= 63) isPensioner = "да";
            else isPensioner = "нет";
        } else {
            if (age >= 58) isPensioner = "да";
            else isPensioner = "нет";
        }
       
        alert(
            "ваше ФИО" + lastName + " " + firstName + " " + patronymic + "\n" +
            "ваш возраст в годах: " + age + "\n" +
            "ваш возраст в днях: " + ageDays + "\n" +
            "через 5 лет вам будет: " + ageIn5Years + "\n" +
            "ваш пол: " + gender + "\n" +
            "вы на пенсии: " + isPensioner
        );
    </script>
</body>
</html>
