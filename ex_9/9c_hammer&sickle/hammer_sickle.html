<!--
1. svg
    + масштабируемость без искажений, можно стилизовать, анимировать части изображения, подходит для сложных детализированных изображений,
    семантичность - для поисковых систем можно сделать доступной информацию об объекте
    -для создания сложных объектов нужен графический редактор, достаточно много кода (это особенно повлияет на удобство работы в случае
    inline-вставки svg), поддерживается не всеми браузерами

2. иконка с помощью шрифтового символа
    + легкость в исполнении
    -ограниченные возможности изменения, стилизации символа

3. сss-графика
    + масштабируемость, быстрота загрузки, графику можно менять прямо в коде, без дополнительных редакторов
    -трудности в реализации сложных объектов, при изменении размера верстка может "разъехаться", отсутствует семантичность - 
    смысл изображения не будет доступен для поисковых систем, в случае замысловатых объектов есть вероятность
    сложностей с будущей поддержкой кода
  

4. возможен способ с помощью canvas ("холст", прямоугольная область на веб-странице, предназначенная для рисования с помощью javascript)


+ Dысокая производительность - сanvas работает быстрее при отрисовке большого количества объектов.
Прямое управление пикселями - gозволяет манипулировать каждым пикселем изображения, это идеально подходит для создания сложных визуальных эффектов
Идеально для динамики: Лучший выбор для создания игр, сложной анимации и визуализации данных, которые постоянно меняются.

- Pастровая природа - при масштабировании изображение может терять четкость и становиться «пиксельным»
Сложность работы с событиями - поскольку canvas — это единая растровая область, браузер не видит отдельные нарисованные на нем фигуры
Для обработки клика по конкретному объекту нужно программно вычислять координаты
Проблема с семантичностью - содержимое сanvas не доступно для поисковых систем без дополнительных настроек
Зависимость от скриптов - если отключен JavaScript, содержимое canvas не будет отображаться

Canvas подойдет, если важна скорость отрисовки множества объектов или попиксельная обработка.
Если нужна четкость при любом масштабе и легкое управление отдельными элементами через CSS/события - лучше подойдет SVG. 

-->
